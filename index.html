<!DOCTYPE html>
<html lang="en" class="theme-light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Theme toggle applied before body renders via inline script to avoid FOUC -->
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.className = 'theme-' + theme;
      })();
    </script>

    <header role="banner">
      <div id="theme-toggle-container">
        <button
          id="theme-toggle"
          type="button"
          aria-label="Switch to dark mode"
          title="Toggle light/dark theme"
        >
          <span id="theme-icon" aria-hidden="true">☀️</span>
        </button>
      </div>
    </header>

    <main id="dashboard" role="main">

      <!-- ── Greeting Widget ──────────────────────────────────── -->
      <section id="greeting-widget" aria-labelledby="greeting-heading">
        <h1 id="greeting-heading" class="sr-only">Greeting</h1>

        <div id="clock-display" aria-live="polite" aria-atomic="true">
          <span id="time-display" aria-label="Current time">--:--:--</span>
        </div>

        <div id="date-display" aria-live="polite" aria-atomic="true">
          <span id="date-text">Loading date…</span>
        </div>

        <div id="greeting-display" aria-live="polite" aria-atomic="true">
          <span id="greeting-text">Hello</span>
        </div>

        <div id="name-form">
          <label for="name-input">Your name</label>
          <input
            id="name-input"
            type="text"
            maxlength="200"
            placeholder="Enter your name"
            aria-describedby="name-error"
          />
          <button id="name-save" type="button">Save</button>
          <span id="name-error" role="alert" class="error-msg" hidden></span>
        </div>
      </section>

      <!-- ── Timer Widget ─────────────────────────────────────── -->
      <section id="timer-widget" aria-labelledby="timer-heading">
        <h2 id="timer-heading">Focus Timer</h2>

        <div
          id="timer-display"
          role="timer"
          aria-live="off"
          aria-label="Countdown timer"
        >
          <span id="timer-time">25:00</span>
        </div>

        <div id="timer-end-indicator" role="status" aria-live="polite" hidden>
          ✅ Session complete!
        </div>

        <div id="timer-controls">
          <button id="timer-start" type="button" aria-label="Start timer">Start</button>
          <button id="timer-stop"  type="button" aria-label="Stop timer"  disabled>Stop</button>
          <button id="timer-reset" type="button" aria-label="Reset timer" disabled>Reset</button>
        </div>

        <div id="duration-form">
          <label for="duration-input">Duration (minutes)</label>
          <input
            id="duration-input"
            type="number"
            min="1"
            max="120"
            value="25"
            aria-describedby="duration-error"
          />
          <button id="duration-save" type="button">Set</button>
          <span id="duration-error" role="alert" class="error-msg" hidden></span>
        </div>
      </section>

      <!-- ── To-Do Widget ─────────────────────────────────────── -->
      <section id="todo-widget" aria-labelledby="todo-heading">
        <h2 id="todo-heading">To-Do</h2>

        <div id="todo-add-form">
          <label for="todo-input">New task</label>
          <input
            id="todo-input"
            type="text"
            maxlength="500"
            placeholder="Add a task…"
            aria-describedby="todo-add-error"
          />
          <button id="todo-add-btn" type="button">Add</button>
          <span id="todo-add-error" role="alert" class="error-msg" hidden></span>
        </div>

        <!-- Tambahan Kontrol Sorting -->
        <div id="todo-sort-controls">
          <button id="todo-sort-asc" type="button" class="task-sort-btn" aria-label="Sort tasks A to Z">Sort A-Z</button>
          <button id="todo-sort-desc" type="button" class="task-sort-btn" aria-label="Sort tasks Z to A">Sort Z-A</button>
        </div>

        <ul id="todo-list" aria-label="Task list"></ul>
      </section>

      <!-- ── Quick Links Widget ───────────────────────────────── -->
      <section id="links-widget" aria-labelledby="links-heading">
        <h2 id="links-heading">Quick Links</h2>

        <div id="links-add-form">
          <label for="link-label-input">Label</label>
          <input
            id="link-label-input"
            type="text"
            maxlength="100"
            placeholder="Label"
            aria-describedby="link-add-error"
          />
          <label for="link-url-input">URL</label>
          <input
            id="link-url-input"
            type="url"
            maxlength="2048"
            placeholder="https://example.com"
            aria-describedby="link-add-error"
          />
          <button id="link-add-btn" type="button">Add</button>
          <span id="link-add-error" role="alert" class="error-msg" hidden></span>
        </div>

        <div id="links-list" role="list" aria-label="Quick links">
          <p id="links-empty-state" class="empty-state">No quick links yet. Add one above.</p>
        </div>
      </section>

    </main>

    <script src="js/app.js"></script>
  </body>
</html>
